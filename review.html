<html lang="zh-CN">
<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  min-height: 100vh;
  color: #e0e0e0;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px;
}
h1 {
  text-align: center;
  font-size: 24px;
  color: #64B5F6;
  margin-bottom: 20px;
  font-weight: 600;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 12px 8px;
  border: 2px solid #4A90D9;
  background: #16213e;
  color: #64B5F6;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.tab-btn:hover { background: #1a2744; }
.tab-btn.active {
  background: #4A90D9;
  color: #fff;
  box-shadow: 0 4px 12px rgba(74,144,217,0.4);
}
.stats-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 10px 16px;
  background: #16213e;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  font-size: 14px;
  color: #aaa;
}
.stats-bar .correct-rate { color: #64B5F6; font-weight: 600; }
.card {
  background: #16213e;
  border-radius: 14px;
  padding: 28px 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  margin-bottom: 20px;
  animation: fadeIn 0.35s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes feedbackIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.q-num {
  font-size: 13px;
  color: #aaa;
  background: #0f3460;
  padding: 4px 10px;
  border-radius: 20px;
}
.q-type {
  font-size: 13px;
  color: #64B5F6;
  font-weight: 500;
}
.q-text {
  font-size: 17px;
  line-height: 1.7;
  margin-bottom: 22px;
  color: #e0e0e0;
}
.options { list-style: none; }
.options li {
  padding: 12px 16px;
  margin-bottom: 10px;
  border: 2px solid #2a3a5c;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  color: #e0e0e0;
}
.options li:hover { border-color: #4A90D9; background: #1a2744; }
.options li.selected { border-color: #4A90D9; background: #1a2744; }
.options li.correct-answer { border-color: #52c41a !important; background: #1b3a1b !important; }
.options li.wrong-answer { border-color: #f5222d !important; background: #3a1b1b !important; }
.options li .radio {
  width: 18px; height: 18px;
  border: 2px solid #666;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.options li.selected .radio {
  border-color: #4A90D9;
}
.options li.selected .radio::after {
  content: '';
  width: 10px; height: 10px;
  background: #4A90D9;
  border-radius: 50%;
}
.fill-input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #2a3a5c;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.3s;
  background: #0f3460;
  color: #e0e0e0;
}
.fill-input:focus { border-color: #4A90D9; }
.fill-input.correct { border-color: #52c41a; background: #1b3a1b; }
.fill-input.wrong { border-color: #f5222d; background: #3a1b1b; }
.judge-btns {

  gap: 16px;

  padding: 14px;
  border: 2px solid #2a3a5c;
  border-radius: 10px;
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  background: #0f3460;
  color: #e0e0e0;
  transition: all 0.2s;
}
.judge-btn:hover { border-color: #4A90D9; }
.judge-btn.selected { border-color: #4A90D9; background: #1a2744; color: #64B5F6; }

.judge-btn.wrong-answer { border-color: #f5222d !important; background: #3a1b1b !important; color: #f5222d !important; }
.submit-btn {
  display: block;
  width: 100%;
  padding: 13px;
  margin-top: 20px;
  background: #4A90D9;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.submit-btn:hover { background: #3a7bc8; }
.submit-btn:disabled { background: #2a3a5c; cursor: not-allowed; color: #666; }
.next-btn {
  display: block;
  width: 100%;
  padding: 13px;
  margin-top: 12px;
  background: #16213e;
  color: #64B5F6;
  border: 2px solid #4A90D9;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.next-btn:hover { background: #1a2744; }
.feedback {
  margin-top: 18px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 15px;
  line-height: 1.6;
  animation: feedbackIn 0.3s ease;
}
.feedback.correct {
  background: #1b3a1b;
  border: 1px solid #2e7d32;
  color: #81c784;
}
.feedback.wrong {
  background: #3a1b1b;
  border: 1px solid #c62828;
  color: #ef9a9a;
}
.feedback .answer-text { font-weight: 600; }
/* Sidebar */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
}
.sidebar-overlay.show { display: block; }
.sidebar {
  position: fixed;
  top: 0;
  left: -280px;
  height: 100vh;
  width: 280px;
  background: #0f1b33;
  border-right: 1px solid #2a3a5c;
  z-index: 100;
  transition: left 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar.show { left: 0; }
.sidebar-toggle-float {
  position: fixed;
  top: 12px;
  left: 12px;
  width: 40px;
  height: 40px;
  background: #16213e;
  border: 1px solid #2a3a5c;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #64B5F6;
  font-size: 20px;
  z-index: 101;
  transition: background 0.2s;

.sidebar-toggle-float:hover { background: #1a2744; }
.sidebar-toggle-float.hidden-btn { display: none; }
.sidebar-header {
  padding: 12px 16px 8px;
  font-size: 14px;
  font-weight: 600;
  color: #64B5F6;
  white-space: nowrap;
  border-bottom: 1px solid #1a2744;
  flex-shrink: 0;

.sidebar-list {

  padding: 6px 0;

.sidebar-item {

  font-size: 13px;
  color: #bbb;

.sidebar-empty {
  padding: 20px 16px;
  color: #666;
  font-size: 13px;
  text-align: center;

@media (max-width: 480px) {
  .container { padding: 12px 10px; }
  .card { padding: 20px 16px; }
  .tab-btn { font-size: 13px; padding: 10px 4px; }
  .q-text { font-size: 15px; }
}
</style>
</head>

var currentTab = 'choice';
var currentIndex = -1;
var answered = false;
var userAnswer = null;
var stats = { total: 0, correct: 0 };
var typeNames = { choice: '\u5355\u9009\u9898', fill: '\u586b\u7a7a\u9898', judge: '\u5224\u65ad\u9898' };
var typeTotal = { choice: 50, fill: 25, judge: 24 };
var seenQuestions = { choice: {}, fill: {}, judge: {} };
var sidebarExpanded = false;

function getRandomIndex(arr, excludeIdx) {
  if (arr.length <= 1) return 0;
  var idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === excludeIdx);
  return idx;
}

function switchTab(tab) {
  currentTab = tab;
  currentIndex = -1;
  var btns = document.querySelectorAll('.tab-btn');
  var tabs = ['choice','fill','judge'];
  for (var i = 0; i < btns.length; i++) {
    if (tabs[i] === tab) btns[i].classList.add('active');
    else btns[i].classList.remove('active');
  }
  renderSidebar();
  loadQuestion();
}

function toggleSidebar() {
  sidebarExpanded = !sidebarExpanded;
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebarExpanded) {
    sidebar.classList.add('show');
    overlay.classList.add('show');
  } else {
    sidebar.classList.remove('show');
    overlay.classList.remove('show');
  }
}

function closeSidebar() {
  sidebarExpanded = false;
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function renderSidebar() {
  var arr = quizData[currentTab];
  var seen = seenQuestions[currentTab];
  var list = document.getElementById('sidebarList');
  var empty = document.getElementById('sidebarEmpty');
  var unseen = [];
  for (var i = 0; i < arr.length; i++) {
    if (!seen[arr[i].num]) unseen.push(arr[i]);
  }
  if (unseen.length === 0) {
    list.innerHTML = '';
    list.style.display = 'none';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.style.display = 'block';
    var html = '';
    for (var i = 0; i < unseen.length; i++) {
      var q = unseen[i];
      var shortQ = q.question.replace(/<[^>]*>/g, '').substring(0, 30);
      if (q.question.length > 30) shortQ += '...';
      html += '<div class="sidebar-item" onclick="jumpToQuestion(' + q.num + ')">';
      html += '<span class="item-num">' + q.num + '</span>';
      html += '<span>' + shortQ + '</span>';
      html += '</div>';
    }
    list.innerHTML = html;
  }
}

function jumpToQuestion(num) {
  var arr = quizData[currentTab];
  var idx = -1;
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].num === num) { idx = i; break; }
  }
  if (idx === -1) return;
  if (autoTimer) { clearTimeout(autoTimer); clearInterval(autoTimer); autoTimer = null; }
  currentIndex = idx;
  closeSidebar();
  loadQuestionDirect();
}

function loadQuestionDirect() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  answered = false;
  userAnswer = null;
  var arr = quizData[currentTab];
  var q = arr[currentIndex];
  seenQuestions[currentTab][q.num] = true;
  var card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.35s ease';

  if (currentTab === 'choice') renderChoice(q, card);
  else if (currentTab === 'fill') renderFill(q, card);
  else renderJudge(q, card);
  renderSidebar();
}

function loadQuestion() {
  if (autoTimer) { clearTimeout(autoTimer); clearInterval(autoTimer); autoTimer = null; }
  answered = false;
  userAnswer = null;
  var arr = quizData[currentTab];
  currentIndex = getRandomIndex(arr, currentIndex);
  var q = arr[currentIndex];
  seenQuestions[currentTab][q.num] = true;
  var card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.35s ease';

  if (currentTab === 'choice') renderChoice(q, card);
  else if (currentTab === 'fill') renderFill(q, card);
  else renderJudge(q, card);
  renderSidebar();
}

function renderChoice(q, card) {
  var keys = ['A','B','C','D'];
  var optsHtml = '';
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var text = q.options[k] || '';
    optsHtml += '<li data-key="' + k + '" onclick="selectOption(this,\'' + k + '\')"><span class="radio"></span><span>' + k + '. ' + text + '</span></li>';
  }
  card.innerHTML =
    '<div class="q-header"><span class="q-num">\u7b2c ' + q.num + ' / ' + typeTotal.choice + ' \u9898</span><span class="q-type">' + typeNames.choice + '</span></div>' +
    '<div class="q-text">' + q.question + '</div>' +
    '<ul class="options" id="opts">' + optsHtml + '</ul>' +
    '<button class="submit-btn" id="submitBtn" onclick="submitChoice()" disabled>\u63d0\u4ea4\u7b54\u6848</button>' +
    '<button class="next-btn" onclick="loadQuestion()">\u4e0b\u4e00\u9898 \u2192</button>' +
    '<div id="feedback"></div>';
}

function selectOption(el, key) {
  if (answered) return;
  userAnswer = key;
  var items = document.querySelectorAll('#opts li');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
  el.classList.add('selected');
  document.getElementById('submitBtn').disabled = false;
}

function submitChoice() {
  if (answered || !userAnswer) return;
  answered = true;
  var q = quizData[currentTab][currentIndex];
  var isCorrect = userAnswer === q.answer;
  stats.total++;
  if (isCorrect) stats.correct++;
  updateStats();

  var items = document.querySelectorAll('#opts li');
  for (var i = 0; i < items.length; i++) {
    var k = items[i].getAttribute('data-key');
    if (k === q.answer) items[i].classList.add('correct-answer');
    else if (k === userAnswer && !isCorrect) items[i].classList.add('wrong-answer');
  }
  document.getElementById('submitBtn').disabled = true;
  showFeedback(isCorrect, q.answer, typeNames.choice);
}

function renderFill(q, card) {
  card.innerHTML =
    '<div class="q-header"><span class="q-num">\u7b2c ' + q.num + ' / ' + typeTotal.fill + ' \u9898</span><span class="q-type">' + typeNames.fill + '</span></div>' +
    '<div class="q-text">' + q.question + '</div>' +
    '<input class="fill-input" id="fillInput" placeholder="\u8bf7\u8f93\u5165\u7b54\u6848..." onkeydown="if(event.key===\'Enter\')submitFill()">' +
    '<button class="submit-btn" id="submitBtn" onclick="submitFill()">\u63d0\u4ea4\u7b54\u6848</button>' +
    '<button class="next-btn" onclick="loadQuestion()">\u4e0b\u4e00\u9898 \u2192</button>' +
    '<div id="feedback"></div>';
  setTimeout(function() { document.getElementById('fillInput').focus(); }, 100);
}

function normalizeStr(s) {
  return s.toLowerCase().replace(/[\s\u3000]+/g, ' ').replace(/\uff0c/g, '\u3001').replace(/,/g, '\u3001').trim();
}

function submitFill() {
  if (answered) return;
  var input = document.getElementById('fillInput');
  var val = input.value.trim();
  if (!val) return;
  answered = true;
  var q = quizData[currentTab][currentIndex];

  var acceptableAnswers = q.answer.split('|');
  var userNorm = normalizeStr(val);
  var isCorrect = false;

  for (var i = 0; i < acceptableAnswers.length; i++) {
    var ansNorm = normalizeStr(acceptableAnswers[i]);
    if (userNorm === ansNorm) { isCorrect = true; break; }
    var parts = ansNorm.split(/[\u3001]\s*/);
    if (parts.length > 1) {
      var allFound = true;
      for (var j = 0; j < parts.length; j++) {
        if (userNorm.indexOf(parts[j].trim()) === -1) { allFound = false; break; }
      }
      if (allFound) { isCorrect = true; break; }
    }
  }

  stats.total++;
  if (isCorrect) stats.correct++;
  updateStats();

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.readOnly = true;
  document.getElementById('submitBtn').disabled = true;
  showFeedback(isCorrect, q.answer, typeNames.fill);
}

function renderJudge(q, card) {
  card.innerHTML =
    '<div class="q-header"><span class="q-num">\u7b2c ' + q.num + ' / ' + typeTotal.judge + ' \u9898</span><span class="q-type">' + typeNames.judge + '</span></div>' +
    '<div class="q-text">' + q.question + '</div>' +
    '<div class="judge-btns" id="judgeBtns">' +
      '<button class="judge-btn" onclick="selectJudge(this,\'T\')">\u2713 \u5bf9</button>' +
      '<button class="judge-btn" onclick="selectJudge(this,\'F\')">\u2717 \u9519</button>' +
    '</div>' +
    '<button class="next-btn" onclick="loadQuestion()">\u4e0b\u4e00\u9898 \u2192</button>' +
    '<div id="feedback"></div>';
}

function selectJudge(el, val) {
  if (answered) return;
  answered = true;
  userAnswer = val;
  var q = quizData[currentTab][currentIndex];
  var isCorrect = val === q.answer;
  stats.total++;
  if (isCorrect) stats.correct++;
  updateStats();

  var btns = document.querySelectorAll('#judgeBtns .judge-btn');
  for (var i = 0; i < btns.length; i++) {
    var bv = btns[i].textContent.indexOf('\u5bf9') !== -1 ? 'T' : 'F';
    if (bv === q.answer) btns[i].classList.add('correct-answer');
    else if (bv === val && !isCorrect) btns[i].classList.add('wrong-answer');
  }
  showFeedback(isCorrect, q.answer === 'T' ? '\u5bf9' : '\u9519', typeNames.judge);
}

var autoTimer = null;
function showFeedback(isCorrect, correctAns, typeName) {
  var fb = document.getElementById('feedback');
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  if (isCorrect) {
    fb.innerHTML = '<div class="feedback correct" id="feedbackMsg">\u2705 \u56de\u7b54\u6b63\u786e\uff01<span id="countdown"> 2</span> \u79d2\u540e\u81ea\u52a8\u8fdb\u5165\u4e0b\u4e00\u9898...</div>';
    var sec = 2;
    var cdEl = document.getElementById('countdown');
    var cdTimer = setInterval(function() {
      sec--;
      if (cdEl) cdEl.textContent = ' ' + sec;
      if (sec <= 0) clearInterval(cdTimer);
    }, 1000);
    autoTimer = setTimeout(function() {
      clearInterval(cdTimer);
      loadQuestion();
    }, 2000);
  } else {
    fb.innerHTML = '<div class="feedback wrong">\u274c \u56de\u7b54\u9519\u8bef\uff01<br><span class="answer-text">\u6b63\u786e\u7b54\u6848\uff1a' + correctAns + '</span></div>';
  }
}

function updateStats() {
  document.getElementById('stats-text').textContent = '\u5df2\u7b54 ' + stats.total + ' \u9898';
  if (stats.total > 0) {
    var rate = (stats.correct / stats.total * 100).toFixed(1);
    document.getElementById('rate-text').textContent = '\u6b63\u786e\u7387 ' + rate + '%';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
  renderSidebar();
  loadQuestion();
});
</script>
